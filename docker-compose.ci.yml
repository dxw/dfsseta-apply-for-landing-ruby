services:
  test:
    build:
      context: .
      target: test
      args:
        RAILS_ENV: "test"
      cache_from:
        - app_test:latest
    image: app_test
    command: bundle exec rake
    ports:
      - "3000:3000"
    depends_on:
      - test-db
    env_file:
       - .env.test
    environment:
      DATABASE_URL: postgres://postgres:password@test-db:5432/app-test
      DATABASE_CLEANER_ALLOW_REMOTE_DATABASE_URL: "true"
      SECRET_KEY_BASE: secret
      CI: "true"
    networks:
      - test-ci

  test-db:
    image: postgres@sha256:b6b4d0b75c699a2c94dfc5a94fe09f38630f3b67ab0e1653ede1b7ac8e13c197
    environment:
      POSTGRES_DB: app-test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    networks:
      - test-ci

networks:
  test-ci:
